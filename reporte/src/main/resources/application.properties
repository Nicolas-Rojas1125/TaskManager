spring.application.name=reportes
server.port=8091

spring.datasource.url=jdbc:mysql://localhost:3306/reportes_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de los otros microservicios para consumir datos vía WebClient
ms.usuario.url=http://localhost:8082
ms.tarea.url=http://localhost:8083
ms.gamificacion.url=http://localhost:8086