spring.application.name=gamificacion
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/gamificacion_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de los otros microservicios (por si se necesita comunicación futura)
ms.usuario.url=http://localhost:8082
ms.tarea.url=http://localhost:8083